services:
  db:
    image: postgis/postgis:16-3.4-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_PORT}:4443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "${APP_PORT}:3000"
      - "${DEBUG_PORT}:9229"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - db
    restart: unless-stopped

  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    stdin_open: true
    tty: true
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=${TUNNEL_DOMAIN}
      - EXPO_PACKAGER_PROXY_URL=https://${TUNNEL_DOMAIN}
    ports:
      - "8081:8081"   # Metro bundler
      - "19000:19000" # Expo
      - "19001:19001" # Expo DevTools
    volumes:
      - ./mobile:/app
      - /app/node_modules
    restart: unless-stopped

  tunnel:
    image: alpine
    command: sh -c "apk add --no-cache openssh-client && ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -R 80:nginx:80 nokey@localhost.run 2>&1"
    depends_on:
      - nginx
    restart: unless-stopped

volumes:
  pgdata:
